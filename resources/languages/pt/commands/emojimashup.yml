label: "emojimashup"
description: "Combine e misture os emojis padrões do Discord para formar novos emojis jamais vistos antes! Atualmente apenas smileys e alguns outros emojis suportados, mas mesmo assim as possibilidades são praticamente infinitas!"

options:
  emoji1:
    text: "O primeiro emoji do mashup"
  emoji2:
    text: "O segundo emoji do mashup"
  emoji3:
    text: "O terceiro emoji do mashup (opcional)"
  emoji4:
    text: "O quarto emoji do mashup (opcional)"

invalidEmoji: "Emoji `{emoji}` inválido! Se for realmente um emoji, eu provavelmente ainda não recortei o emoji para que possa fazer aquela colagem marota com ele... mas talvez em breve você poderá utilizar esse emoji em suas misturas incríveis!"
invalidEmojiDiscord: "Emoji `{emoji}` não é um emoji padrão do Discord! Infelizmente juntar emojis personalizados do Discord seria muuuito difícil e trabalhoso, desculpe por ainda não conseguir juntar os seus maravilhosos emojis personalizados..."
