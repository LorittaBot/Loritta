website:
  dashboard:
    honeypot:
      title: "Canais de Armadilha"
      description:
        - "Você já percebeu que contas que foram hackeadas sempre enviam a mesma mensagem em todos os canais do seu servidor? Então o que irá acontecer se a gente criasse um canal de armadilha onde contas que enviam mensagens no canal são automaticamente punidas?"
        - "Canais de Armadilha servem exatamente para isso, canais públicos onde qualquer pessoa que enviar uma mensagem nele será automaticamente punida do seu servidor. Útil para punir e deletar mensagens de contas hackeadas que estão fazendo spam em todos os canais ao mesmo tempo."
      enable:
