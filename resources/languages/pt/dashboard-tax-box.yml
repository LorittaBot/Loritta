website:
  dashboard:
    taxBox:
      title: "Caixinha de Taxas"
      description:
      - "Receba sonhos por engajar os membros do seu servidor! Administradores do servidor podem sacar os sonhos acumulados a qualquer momento usando o comando {caixinhaCommand}."

      enabled:
        toggle: "Ativar Caixinha de Taxas"
        description: "Se ativado, 50% das taxas dos comandos {coinFlipBetCommand} e {emojiFightBetCommand} e 50% da margem da casa dos jogos {minesPlayCommand} e {blackjackPlayCommand} no seu servidor irão para a caixinha de taxas."
